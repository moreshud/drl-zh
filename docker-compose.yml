services:
  drlzh-dev-env:
    # Build configuration.
    build:
      context: .
      dockerfile: Dockerfile
      # UID/GID come from the .env file (README step 2). BASE_IMAGE and
      # TORCH_VARIANT default to the GPU-capable variant; docker-compose.cpu.yml
      # overrides them for a lean CPU-only build.
      args:
        UID: ${UID}
        GID: ${GID}
        BASE_IMAGE: nvidia/cuda:12.9.1-runtime-ubuntu24.04
        TORCH_VARIANT: cuda
    
    container_name: drlzh-dev-env

    # Volumes for data persistence and code mounting.
    volumes:
      - .:/home/coder/project:cached
      # Persist ONLY user settings / keybindings across restarts. Extensions
      # live in a sibling directory (.../code-server/extensions) and are
      # deliberately not volume-mounted so image rebuilds ship fresh
      # extension versions instead of being shadowed by a stale volume.
      - vscode-user:/home/coder/.local/share/code-server/User
      # Mount a named volume to persist the poetry cache at runtime.
      - poetry-cache:/home/coder/.cache/pypoetry

    # Port mappings from host to container.
    ports:
      - "8080:8080"
      - "8888:8888"

    # Set environment variables inside the container.
    environment:
      - PUID=${UID}
      - PGID=${GID}

    # Ensure the container has enough shared memory.
    shm_size: '2gb'
    restart: unless-stopped

# Define the named volumes for persisting data.
volumes:
  vscode-user:
  poetry-cache:
